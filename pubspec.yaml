name: panoramicai
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.20.2
  font_awesome_flutter: ^10.8.0
  cached_network_image: ^3.4.1
  equatable: ^2.0.7
  dio: ^5.8.0+1
  toastification: ^3.0.3
  carousel_slider: ^5.1.1
